version: '3.8'

services:
  db:
    image: mysql:8
    container_name: assetflow-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-assetflow}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-backend
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-assetflow}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key}
      - JWT_EXPIRY=${JWT_EXPIRY:-1d}
      - PORT=${PORT:-5000}
    depends_on:
      - db

volumes:
  db_data:
